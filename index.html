<!--
  ============================================================
  GIFTFINDER - Static swipe-to-like product app
  ============================================================

  FILES
  -----
  index.html   - this file (markup + README)
  styles.css   - all visual styles (mobile-first)
  app.js       - all logic (state, rendering, Google Sheets logging)
  products.js  - product list (edit this to add/remove products)

  HOW TO ADD PRODUCTS
  -------------------
  Edit products.js. Each item in the PRODUCT_LIST array needs:
    { id: "unique-id", title: "Name", url: "https://...", image: "https://..." }
  IDs must be stable - never change an id once set or progress breaks.
  New products are automatically shown to users who haven't seen them.
  Works when opened directly from the filesystem (no server needed).

  HOW TO DEPLOY TO GITHUB PAGES
  -----------------------------
  1. Push this repo to GitHub (main branch).
  2. Go to repo Settings -> Pages.
  3. Set Source to "Deploy from a branch", pick main / root.
  4. Save. GitHub Pages URL will appear (e.g. https://yourname.github.io/repo/).
  5. Share that URL with the person using the app.
  HOW TO SET UP GOOGLE APPS SCRIPT
  --------------------------------
  1. Open the Google Sheet:
     https://docs.google.com/spreadsheets/d/1ndK65dNkl7bwt-5xMocd3xR9ASWmBu5aCp_2Ds7ulwk/edit?usp=sharing
  2. Open Extensions -> Apps Script.
  3. Paste and deploy a doPost(e) function (see app.js comments).
  4. Deploy as Web App: Execute as "Me", access "Anyone".
  5. Copy the Web App URL.
  6. Open app.js and replace PASTE_GOOGLE_APPS_SCRIPT_URL_HERE with your URL.
  7. Commit and push - the live site updates automatically.
  ============================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>GiftFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1 class="topbar-title">GiftFinder</h1>
      <button id="resetBtn" type="button" class="btn-ghost">Reset progress</button>
    </header>

    <section class="card-section" aria-live="polite">
      <div id="loadingState" class="status-card">
        <div class="spinner"></div>
        <p>Loading products...</p>
      </div>

      <div id="productCard" class="card hidden">
        <div class="stamp stamp-like" aria-hidden="true">LIKE</div>
        <div class="stamp stamp-super-like" aria-hidden="true">SUPER</div>
        <div class="stamp stamp-nope" aria-hidden="true">NOPE</div>

        <img id="productImage" class="card-img" alt="" />
        <div class="card-no-image hidden" aria-hidden="true">★</div>

        <div class="card-overlay">
          <h2 id="productTitle" class="card-title"></h2>
          <a id="productLink" class="card-link" target="_blank" rel="noopener noreferrer">View product →</a>
        </div>
      </div>

      <div id="emptyState" class="status-card hidden">
        <h2 id="emptyHeading">You reached the end</h2>
        <p id="emptyBody">No more products for now.</p>
      </div>
    </section>

    <section class="actions">
      <div class="action-item">
        <button id="nopeBtn" type="button" class="btn-action btn-nope" aria-label="Nope">✕</button>
        <span class="action-label">Nope</span>
      </div>
      <div class="action-item action-item-center">
        <button id="superLikeBtn" type="button" class="btn-action btn-super-like" aria-label="Super Like">★</button>
        <span class="action-label">Super Like</span>
      </div>
      <div class="action-item">
        <button id="likeBtn" type="button" class="btn-action btn-like" aria-label="Like">♥</button>
        <span class="action-label">Like</span>
      </div>
    </section>

    <section class="likes">
      <h2 class="likes-heading">Your Positive Picks</h2>
      <div id="likesList"></div>
    </section>
  </main>

  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>
