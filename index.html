<!--
  ============================================================
  GIFTFINDER — Static swipe-to-like product app
  ============================================================

  FILES
  ─────
  index.html    — this file (markup + README)
  styles.css    — all visual styles (mobile-first)
  app.js        — all logic (state, rendering, submit)
  products.json — product list (edit this to add products)

  HOW TO ADD PRODUCTS
  ───────────────────
  Edit products.json. Each item needs:
    { "id": "unique-id", "title": "Name", "url": "https://…", "image": "https://…" }
  IDs must be stable — never change a product's id or progress breaks.
  New products are automatically shown to users who haven't seen them.

  HOW TO DEPLOY TO GITHUB PAGES
  ──────────────────────────────
  1. Push this repo to GitHub (main branch).
  2. Go to repo Settings → Pages.
  3. Set Source to "Deploy from a branch", pick main / root.
  4. Save. GitHub Pages URL will appear (e.g. https://yourname.github.io/repo/).
  5. Share that URL with the person using the app.
  Note: fetch('./products.json') requires HTTP — it does NOT work when
        opening index.html directly from the filesystem. Use GitHub Pages
        or a local server (e.g. VS Code Live Server) for testing.

  HOW TO SET UP GOOGLE APPS SCRIPT
  ──────────────────────────────────
  1. Open Google Sheets → Extensions → Apps Script.
  2. Paste and deploy a doPost(e) function (see app.js comments).
  3. Deploy as Web App: Execute as "Me", access "Anyone".
  4. Copy the Web App URL.
  5. Open app.js and replace PASTE_GOOGLE_APPS_SCRIPT_URL_HERE with your URL.
  6. Commit and push — the live site updates automatically.
  ============================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>GiftFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">

    <header class="topbar">
      <h1 class="topbar-title">GiftFinder</h1>
      <button id="resetBtn" type="button" class="btn-ghost">Reset progress</button>
    </header>

    <!-- Product card / loading / empty state -->
    <section class="card-section" aria-live="polite">

      <div id="loadingState" class="status-card">
        <div class="spinner"></div>
        <p>Loading products…</p>
      </div>

      <div id="productCard" class="card hidden">
        <!-- Stamps shown while dragging -->
        <div class="stamp stamp-like" aria-hidden="true">LOVE</div>
        <div class="stamp stamp-nope" aria-hidden="true">NOPE</div>

        <img id="productImage" class="card-img" alt="" />
        <div class="card-no-image hidden" aria-hidden="true"></div>

        <div class="card-overlay">
          <h2 id="productTitle" class="card-title"></h2>
          <a id="productLink" class="card-link" target="_blank" rel="noopener noreferrer">View product →</a>
        </div>
      </div>

      <div id="emptyState" class="status-card hidden">
        <h2 id="emptyHeading">You reached the end</h2>
        <p id="emptyBody">No more products for now.</p>
      </div>

    </section>

    <!-- Like / Nope -->
    <section class="actions">
      <div class="action-item">
        <button id="nopeBtn" type="button" class="btn-action btn-nope" aria-label="Nope">✕</button>
        <span class="action-label">Nope</span>
      </div>
      <div class="action-item">
        <button id="likeBtn" type="button" class="btn-action btn-like" aria-label="Like">♥</button>
        <span class="action-label">Like</span>
      </div>
    </section>

    <!-- Submit -->
    <section class="submit-section">
      <button id="submitBtn" type="button" class="btn-submit" disabled>Submit results</button>
      <p id="submitMsg" class="submit-msg hidden"></p>
    </section>

    <!-- Counts -->
    <section class="status">
      <span class="status-chip">Seen <strong id="seenCount">0</strong></span>
      <span class="status-chip">Liked <strong id="likedCount">0</strong></span>
      <span class="status-chip">Left <strong id="remainingCount">0</strong></span>
    </section>

    <!-- Liked products list -->
    <section class="likes">
      <h2 class="likes-heading">Your Likes</h2>
      <div id="likesList"></div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
